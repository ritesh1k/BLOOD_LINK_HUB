<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="auth-pages.css">
    <link rel="stylesheet" href="main-nav.css">
    <script defer src="main-nav.js"></script>
</head>
<body class="auth-page donor-signup-bg">
    <div id="main-nav-root"></div>
    <div class="container">
        <h2>Reset Password</h2>
        <form id="resetPasswordForm">
            <input type="password" id="newPassword" placeholder="New password" minlength="6" required>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" minlength="6" required>
            <button type="submit">Update Password</button>
        </form>
        <p class="auth-note"><a id="backToLoginLink" href="receiver_login.html">Back to login</a></p>
    </div>

    <script src="../api.js"></script>
    <script>
        (function initResetPage() {
            const params = new URLSearchParams(window.location.search);
            const token = String(params.get("token") || "").trim();
            const roleParam = String(params.get("role") || "").toLowerCase();
            const role = roleParam === "donor" ? "donor" : "receiver";
            const backToLoginLink = document.getElementById("backToLoginLink");
            backToLoginLink.href = role === "donor" ? "donor_login.html" : "receiver_login.html";

            if (!token) {
                alert("Invalid reset link. Please request password reset again.");
                window.location.href = "forgot-password.html?role=" + encodeURIComponent(role);
                return;
            }

            document.getElementById("resetPasswordForm").onsubmit = async function(event) {
                event.preventDefault();
                const newPassword = document.getElementById("newPassword").value;
                const confirmPassword = document.getElementById("confirmPassword").value;

                if (newPassword.length < 6) {
                    alert("Password must be at least 6 characters.");
                    return;
                }

                if (newPassword !== confirmPassword) {
                    alert("Passwords do not match.");
                    return;
                }

                try {
                    await resetPassword({ token: token, new_password: newPassword });
                    alert("Password reset successful. Please login with your new password.");
                    window.location.href = backToLoginLink.href;
                } catch (error) {
                    alert(error.message || "Unable to reset password.");
                }
            };
        })();
    </script>
</body>
</html>
