<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receiver Signup</title>
    <link rel="stylesheet" href="auth-pages.css">
    <link rel="stylesheet" href="main-nav.css">
    <script defer src="main-nav.js"></script>
</head>
<body class="auth-page receiver-bg">
    <div id="main-nav-root"></div>
    <div class="container">
        <h2>Receiver Signup</h2>
        <form id="signupForm">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <input type="password" id="password" placeholder="Password" required>
            <select id="bloodGroup" required>
                <option value="">Select Blood Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
            <input type="text" id="location" placeholder="Location" required>
            <button type="submit">Sign Up</button>
        </form>
        <p class="auth-note">Already have an account? <a href="receiver_login.html">Login here</a></p>
    </div>

    <script src="../api.js"></script>

    <script>
        document.getElementById("signupForm").onsubmit = async function(event) {
            event.preventDefault();
            
            let fullName = document.getElementById("fullName").value.trim();
            let email = document.getElementById("email").value.trim().toLowerCase();
            let phone = document.getElementById("phone").value.trim();
            let password = document.getElementById("password").value;
            let bloodGroup = document.getElementById("bloodGroup").value;
            let location = document.getElementById("location").value.trim();

            if (fullName === "" || email === "" || phone === "" || password === "" || bloodGroup === "" || location === "") {
                alert("Please fill in all fields!");
                return;
            }

            try {
                await registerUser({
                    name: fullName,
                    email,
                    phone,
                    password,
                    blood_group: bloodGroup,
                    role: "receiver"
                });

                alert("Signup successful! Please login.");
                window.location.href = "receiver_login.html";
            } catch (error) {
                alert(error.message || "Signup failed.");
            }
        };
    </script>
</body>
</html>
