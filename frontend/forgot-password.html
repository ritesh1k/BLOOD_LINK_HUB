<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="auth-pages.css">
    <link rel="stylesheet" href="main-nav.css">
    <script defer src="main-nav.js"></script>
</head>
<body class="auth-page receiver-bg">
    <div id="main-nav-root"></div>
    <div class="container">
        <h2>Forgot Password</h2>
        <form id="forgotPasswordForm">
            <input type="email" id="email" placeholder="Enter your registered email" required>
            <button type="submit">Send Reset Link</button>
        </form>
        <p class="auth-note" id="roleHint"></p>
        <p class="auth-note"><a id="backToLoginLink" href="receiver_login.html">Back to login</a></p>
    </div>

    <script src="../api.js"></script>
    <script>
        (function setupRoleContext() {
            const params = new URLSearchParams(window.location.search);
            const roleParam = String(params.get("role") || "").toLowerCase();
            const role = roleParam === "donor" ? "donor" : "receiver";
            const roleLabel = role === "donor" ? "donor" : "receiver";
            const roleHint = document.getElementById("roleHint");
            const backToLoginLink = document.getElementById("backToLoginLink");

            roleHint.textContent = "Reset link will be generated for your " + roleLabel + " account.";
            backToLoginLink.href = role === "donor" ? "donor_login.html" : "receiver_login.html";

            document.getElementById("forgotPasswordForm").onsubmit = async function(event) {
                event.preventDefault();
                const email = document.getElementById("email").value.trim().toLowerCase();

                try {
                    await forgotPassword({ email: email, role: role });
                    alert("If this account exists, reset link has been sent to registered email and phone.");
                    window.location.href = backToLoginLink.href;
                } catch (error) {
                    alert(error.message || "Unable to process password reset request.");
                }
            };
        })();
    </script>
</body>
</html>
