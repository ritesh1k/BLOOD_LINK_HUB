<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="main-nav.css">
    <script defer src="main-nav.js"></script>
</head>
<body>
    <div id="main-nav-root"></div>

    <section class="contact-info">
        <h2 class="section-title">Get in Touch</h2>
        <p>Email: info@bloodlinkhub.com</p>
        <p>Phone: +91 7295014633</p>
        <p>Address:MORADABAD(TMU), INDIA</p>
    </section>

    <section class="contact-form">
        <h2 class="section-title">Send Us a Message</h2>
        <form id="contactForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </section>

    <section class="map">
        <h2 class="section-title">Our Location</h2>
        <p id="locationStatus" class="location-status">Allow location access to see nearby blood donation centers, hospitals, and clinics.</p>
        <div class="location-controls" role="group" aria-label="Nearby location filters">
            <button type="button" class="location-filter active" data-place="blood donation center">Blood Donation Centers</button>
            <button type="button" class="location-filter" data-place="hospital">Hospitals</button>
            <button type="button" class="location-filter" data-place="clinic">Clinics</button>
        </div>
        <iframe
            id="nearbyMap"
            src="https://www.google.com/maps?q=India&output=embed"
            width="100%" height="300" class="map-frame" allowfullscreen="" loading="lazy">
        </iframe>
    </section>

    <footer>
        <p>&copy; 2025 BloodLink Hub. All rights reserved.</p>
    </footer>

    <script src="../api.js"></script>
    <script src="contact.js"></script>
</body>
</html>
