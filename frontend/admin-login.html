<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="main-nav.css" />
  <script defer src="main-nav.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f8; }
    .box {
      max-width: 420px;
      margin: 60px auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: #8b1016;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .brand img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }
    h1 { margin: 0 0 14px; color: #d32f2f; font-size: 24px; }
    .hint { color: #666; font-size: 13px; margin-bottom: 14px; }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #d32f2f;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #b71c1c; }
    .msg { margin-top: 10px; font-size: 13px; }
  </style>
</head>
<body>
  <div id="main-nav-root"></div>

  <div class="box">
    <a class="brand" href="index.html" title="Go to Home Page">
      <img src="logo.avif" alt="BloodLink Hub Logo" />
      <span>BloodLink Hub</span>
    </a>
    <h1>Admin Login</h1>
    <p class="hint">Use admin credentials to access the admin dashboard.</p>

    <form id="adminLoginForm">
      <input type="text" id="adminId" placeholder="Admin ID" required />
      <input type="password" id="adminPassword" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="adminLoginMsg" class="msg"></p>
  </div>

  <script src="../api.js"></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const adminId = document.getElementById('adminId').value.trim();
      const adminPassword = document.getElementById('adminPassword').value;
      const msg = document.getElementById('adminLoginMsg');

      msg.textContent = '';
      if (!adminId || !adminPassword) {
        msg.style.color = 'red';
        msg.textContent = 'Please enter admin ID and password.';
        return;
      }

      try {
        await adminLogin({ admin_id: adminId, password: adminPassword });
        msg.style.color = 'green';
        msg.textContent = 'Login successful. Redirecting...';
        setTimeout(function () {
          window.location.href = 'admin-dashboard.html';
        }, 400);
      } catch (error) {
        msg.style.color = 'red';
        msg.textContent = error.message || 'Invalid admin credentials.';
      }
    });
  </script>
</body>
</html>
